name: Update Data

on:
  schedule:
    # Mondays 06:00 UTC. Smogon publishes last month's stats on the 1st-2nd,
    # so the first Monday run of each month also picks up the new SP spreads.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync Showdown + Champions catalogs
        run: npm run sync-data

      - name: Sync Limitless Champions usage
        run: npm run sync-champions-data

      - name: Sync Smogon Champions SP spreads
        run: npm run sync-champions-spreads

      - name: Sync NCP Champions curated sets
        run: npm run sync-ncp-spreads

      - name: Run tests
        run: npm test

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "Update generated catalogs (Showdown/Champions, Limitless usage, Smogon SP spreads, NCP sets)"
          git push
